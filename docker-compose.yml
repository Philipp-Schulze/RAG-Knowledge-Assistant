services:
  # --- Database ---
  postgres:
    image: ankane/pgvector:latest
    container_name: rag_postgres
    environment:
      POSTGRES_DB: rag_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password123}
    ports:
      - "5432:5432"
    volumes:
      - ./data/pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  # --- AI Engine (Ollama) ---
  ollama:
    image: ollama/ollama:latest
    container_name: rag_ollama
    volumes:
      - ollama_storage:/root/.ollama
    ports:
      - "11434:11434"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # 1. Start Ollama in the background
        ollama serve &
        
        # 2. Wait for the server to be ready
        echo "Waiting for Ollama to start..."
        until ollama list > /dev/null 2>&1; do
          sleep 2
        done
        
        # 3. Pull the models
        echo "Pulling models..."
        ollama pull nomic-embed-text
        ollama pull qwen2.5:1.5b
        ollama pull qwen2.5:7b
        echo "All models downloaded."
        
        # 4. Bring the background process to the foreground to keep the container running
        wait $!
        
  # --- RAG Services ---
  retrieval:
    build:
      context: .
      dockerfile: services/retrieval/Dockerfile
    container_name: rag_retrieval
    env_file: .env
    depends_on:
      - postgres
      - ollama

  ingestion:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    container_name: rag_ingestion
    env_file: .env
    depends_on:
      - postgres
      - ollama

  augmentation:
    build:
      context: .
      dockerfile: services/augmentation/Dockerfile
    container_name: rag_augmentation
    volumes:
      - ./services/augmentation:/app/services/augmentation
      - ./shared:/app/shared
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - PYTHONPATH=/app/services/augmentation
    depends_on:
      - ollama

  backend:
    build:
      context: .
      dockerfile: services/backend/Dockerfile
    container_name: rag_backend
    ports:
      - "8001:8000"
    env_file: .env
    depends_on:
      - postgres

  generation:
    build:
      context: .
      dockerfile: services/generation/Dockerfile
    container_name: rag_generation
    env_file: .env
    depends_on:
      - ollama

  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
    container_name: rag_frontend
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      - AUGMENTATION_URL=http://rag_augmentation:8000
      - BACKEND_URL=http://rag_backend:8000
    depends_on:
      - retrieval
      - augmentation
      - backend

volumes:
  ollama_storage:
  # pg_data is handled by your relative bind mount ./data/pg_data