services:
  # --- Database ---
  postgres:
    image: ankane/pgvector:latest
    container_name: rag_postgres
    environment:
      POSTGRES_DB: rag_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password123}
    ports:
      - "5432:5432"
    volumes:
      - ./data/pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  # --- AI Engine (Ollama) ---
  # Ollama runs natively on the host for Metal/GPU acceleration (see CLAUDE.md).
  # Containers reach it via OLLAMA_URL=http://host.docker.internal:11435 (set in .env).

  # --- RAG Services ---
  retrieval:
    build:
      context: .
      dockerfile: services/retrieval/Dockerfile
    container_name: rag_retrieval
    env_file: .env
    depends_on:
      - postgres

  ingestion:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    container_name: rag_ingestion
    env_file: .env
    depends_on:
      - postgres

  augmentation:
    build:
      context: .
      dockerfile: services/augmentation/Dockerfile
    container_name: rag_augmentation
    volumes:
      - ./services/augmentation:/app/services/augmentation
      - ./shared:/app/shared
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - PYTHONPATH=/app/services/augmentation

  backend:
    build:
      context: .
      dockerfile: services/backend/Dockerfile
    container_name: rag_backend
    ports:
      - "8001:8000"
    env_file: .env
    depends_on:
      - postgres

  generation:
    build:
      context: .
      dockerfile: services/generation/Dockerfile
    container_name: rag_generation
    env_file: .env

  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
    container_name: rag_frontend
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      - AUGMENTATION_URL=http://rag_augmentation:8000
      - BACKEND_URL=http://rag_backend:8000
    depends_on:
      - retrieval
      - augmentation
      - backend

# pg_data is handled by your relative bind mount ./data/pg_data